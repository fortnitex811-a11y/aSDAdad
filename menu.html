<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Menu | The Daily Grind</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #fdfaf7; color: #3d2b1f; }
        nav { background: #2c1e14; color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #d4a373; text-decoration: none; }
        nav ul { list-style: none; display: flex; }
        nav ul li { margin-left: 20px; }
        nav a { color: white; text-decoration: none; }
        
        .menu-container { padding: 50px 10%; text-align: center; }
        h1 { margin-bottom: 30px; color: #6f4e37; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; max-width: 800px; margin: 0 auto; }
        .item { border-bottom: 1px dashed #d4a373; padding: 10px 0; display: flex; justify-content: space-between; }
        .price { font-weight: bold; color: #d4a373; }
        .back-btn { display: inline-block; margin-top: 40px; color: #6f4e37; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">THE DAILY GRIND</a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
        </ul>
    </nav>

    <div class="menu-container">
        <h1>Our Full Menu</h1>
        <div class="menu-grid">
            <div class="item"><span>Espresso</span> <span class="price">₱120</span></div>
            <div class="item"><span>Americano</span> <span class="price">₱140</span></div>
            <div class="item"><span>Latte</span> <span class="price">₱160</span></div>
            <div class="item"><span>Cappuccino</span> <span class="price">₱160</span></div>
            <div class="item"><span>Spanish Latte</span> <span class="price">₱180</span></div>
            <div class="item"><span>Cold Brew</span> <span class="price">₱170</span></div>
        </div>
        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>

</body>
</html>
